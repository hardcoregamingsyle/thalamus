name: Prune branch

# One-off janitor for stale remote branches. Runs on GitHub's own runner with
# the built-in token, so it can delete refs the local tooling can't reach.
# Manual trigger only — hand it the branch name and it's gone.
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to delete (no refs/heads/ prefix)
        required: true

permissions:
  contents: write

jobs:
  prune:
    name: Delete remote branch
    runs-on: ubuntu-latest
    steps:
      - name: Delete ref
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ inputs.branch }}
        run: gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${BRANCH}"
