name: Build & Release Thalamus

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

jobs:
  build-wpf:
    name: Build WPF Desktop App
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # On workflow_dispatch the ref_name is the branch name (e.g. "main"), not a tag.
          # Use the manually supplied version input in that case.
          if ($tag -notmatch '^v\d') {
            $tag = "${{ github.event.inputs.version }}"
          }
          if (-not $tag -or $tag -notmatch '^v\d') {
            $tag = "v2.0.0"
          }
          $ver = $tag.TrimStart('v')
          # Ensure the version is a valid AssemblyVersion (must be numeric, e.g. 2.0.0)
          if ($ver -notmatch '^\d+(\.\d+)*$') {
            $ver = "2.0.0"
            $tag = "v2.0.0"
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "ver=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $ver (tag: $tag)"

      - name: Restore dependencies
        working-directory: thalamus-native/ThalamusApp
        run: dotnet restore ThalamusApp.csproj

      - name: Build & Publish (self-contained single-file)
        working-directory: thalamus-native/ThalamusApp
        shell: pwsh
        run: |
          dotnet publish ThalamusApp.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:AssemblyVersion=${{ steps.version.outputs.ver }} `
            -p:FileVersion=${{ steps.version.outputs.ver }} `
            -o ./publish

      - name: Rename output
        working-directory: thalamus-native/ThalamusApp/publish
        shell: pwsh
        run: |
          if (Test-Path "ThalamusApp.exe") {
            Rename-Item "ThalamusApp.exe" "Thalamus.exe"
          }
          Get-ChildItem -Name

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Thalamus-exe
          path: thalamus-native/ThalamusApp/publish/Thalamus.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Thalamus ${{ steps.version.outputs.tag }}
          # Deliberately no `body:` here. Notes are written per-release (the tag
          # is cut with real notes before this runs); omitting body means the
          # action uploads the exe without clobbering them. The old hardcoded
          # "v2.0.0" changelog used to overwrite every release with stale text.
          files: |
            thalamus-native/ThalamusApp/publish/Thalamus.exe
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
