name: Build Windows Installer

on:
  push:
    branches: [main]
    paths:
      - 'thalamus-native/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Installer version'
        required: true
        default: '1.0.0'

env:
  APP_VERSION: ${{ github.event.inputs.version || '1.0.0' }}

jobs:
  build-installers:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build Thalamus.exe from C++ source ─────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Qt
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\Qt
          key: ${{ runner.os }}-Qt-6.5.3-msvc2022_64

      - name: Install aqtinstall
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: pip install aqtinstall

      - name: Install Qt 6.5.3
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          python -m aqt install-qt windows desktop 6.5.3 win64_msvc2022_64 --outputdir ${{ github.workspace }}\Qt

      - name: Set Qt environment
        shell: bash
        run: |
          QtDir=$(ls -d "${{ github.workspace }}/Qt/"*/msvc2022_64 2>/dev/null | head -1)
          echo "CMAKE_PREFIX_PATH=$QtDir" >> "$GITHUB_ENV"
          echo "Qt installed at: $QtDir"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Build Thalamus.exe
        shell: cmd
        run: |
          cd thalamus-native
          if not exist build mkdir build
          cd build
          cmake ..\ThalamusApp -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%CMAKE_PREFIX_PATH%"
          cmake --build . --config Release --parallel
          cd ..
          if (-not (Test-Path dist)) { New-Item -ItemType Directory -Force dist }
          Copy-Item "build/Thalamus.exe" "dist/Thalamus.exe" -Force
          Copy-Item "build/Thalamus.exe" "installer/Thalamus.exe" -Force
          Write-Host "Thalamus.exe built successfully"

      # ── WiX v4 MSI + Burn EXE ──────────────────────────────────────
      - name: Install WiX
        run: |
          dotnet tool install --global wix
          wix --version

      - name: Install WiX Extensions
        run: |
          wix extension add WixToolset.UI.wixext
          wix extension add WixToolset.Bal.wixext

      - name: Build MSI Installer
        working-directory: thalamus-native
        shell: cmd
        run: |
          wix build installer\Product.wxs -o dist\Thalamus-Setup-v%APP_VERSION%.msi -ext WixToolset.UI.wixext -arch x64

      - name: Build Burn EXE
        working-directory: thalamus-native
        shell: cmd
        run: |
          wix build installer\Bundle.wxs -o dist\Thalamus-Setup-Burn-v%APP_VERSION%.exe -ext WixToolset.Bal.wixext -arch x64

      # ── Inno Setup EXE ─────────────────────────────────────────────
      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Build EXE Installer (Inno Setup)
        run: |
          $iscc = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($iscc) {
            & $iscc thalamus-native\installer\setup.iss /Q
          } else {
            Write-Host "ISCC not found - skipping Inno Setup build"
          }

      # ── Upload artifacts ────────────────────────────────────────────
      - name: List outputs
        run: Get-ChildItem -Path thalamus-native\dist -Recurse

      - name: Upload MSI
        if: hashFiles('thalamus-native/dist/Thalamus-Setup-v*.msi') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Thalamus-MSI
          path: thalamus-native/dist/Thalamus-Setup-v*.msi

      - name: Upload Burn EXE
        if: hashFiles('thalamus-native/dist/Thalamus-Setup-Burn-v*.exe') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Thalamus-Burn-EXE
          path: thalamus-native/dist/Thalamus-Setup-Burn-v*.exe

      - name: Upload Inno Setup EXE
        if: hashFiles('thalamus-native/dist/Thalamus-Setup-v*.exe') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Thalamus-EXE
          path: thalamus-native/dist/Thalamus-Setup-v*.exe

      - name: Upload Thalamus binary
        if: hashFiles('thalamus-native/dist/Thalamus.exe') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Thalamus-binary
          path: thalamus-native/dist/Thalamus.exe
