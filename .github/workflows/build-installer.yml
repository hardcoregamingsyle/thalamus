# ═══════════════════════════════════════════════════════════════════════════
#  Thalamus AI — Windows Installer Builder
#
#  Triggered by pushing a tag matching v*.*.*-native (e.g. v1.0.0-native).
#  Builds the Qt 6 C++ desktop app and WiX Burn bundle installer on a
#  Windows GitHub Actions runner, then creates a GitHub Release with the
#  installer .exe attached — which is what the "Download for Windows"
#  buttons on the Landing page and VM Setup dialog point to.
# ═══════════════════════════════════════════════════════════════════════════

name: Build Windows Installer

on:
  push:
    tags:
      - 'v*.*.*-native'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0-native)'
        required: true
        default: 'v1.0.0-native'

env:
  APP_VERSION: '1.0.0'
  INSTALLER_NAME: 'Thalamus-Setup-v1.0.0.exe'

jobs:
  build-installer:
    name: Build Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install Qt 6 ──────────────────────────────────────────────────────
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtwebsockets'
          cache: true

      # ── Install WiX Toolset v4 ────────────────────────────────────────────
      - name: Install WiX Toolset v4
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix --version

          # Download WiX v4 extension DLLs from NuGet directly.
          # wix extension add is unreliable in CI — we download the .nupkg,
          # extract it, and reference the DLLs by absolute path.
          $extDir = "$env:USERPROFILE\.wix\extensions"
          New-Item -ItemType Directory -Path $extDir -Force | Out-Null

          function Get-WixExtension($pkgName) {
            # Ensure TLS 1.2 for NuGet.org
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
            $zipPath = "$extDir\$pkgName.zip"
            $outDir = "$extDir\$pkgName"
            Write-Host "Downloading $pkgName..."
            Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/$pkgName/4.0.5" `
              -OutFile $zipPath -UseBasicParsing
            Expand-Archive -Path $zipPath -DestinationPath $outDir -Force
            $dll = Get-ChildItem -Path $outDir -Recurse | Where-Object { $_.Name -eq "$pkgName.dll" } | Select-Object -First 1
            if (-not $dll) { throw "Could not find $pkgName.dll in extracted NuGet package" }
            Remove-Item $zipPath -Force
            return $dll.FullName
          }

          $uiDll = Get-WixExtension "WixToolset.UI.wixext"
          $balDll = Get-WixExtension "WixToolset.Bal.wixext"

          Write-Host "UI DLL: $uiDll"
          Write-Host "BAL DLL: $balDll"

          # Export as env vars for later steps
          echo "WIX_UI_DLL=$uiDll" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "WIX_BAL_DLL=$balDll" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── Set up MSVC developer environment ─────────────────────────────────
      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: 14.4

      # ── Configure CMake (Ninja generator, dynamic libs for CI) ──────────
      - name: Configure CMake
        shell: pwsh
        run: |
          cd thalamus-native
          mkdir build -Force
          cd build
          cmake ../ThalamusApp -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON

      # ── Build with MSVC ──────────────────────────────────────────────────
      - name: Build ThalamusApp
        shell: pwsh
        run: |
          cmake --build thalamus-native/build --parallel

      # ── Collect Qt DLLs with windeployqt ──────────────────────────────────
      - name: Deploy Qt Runtime DLLs
        shell: pwsh
        run: |
          $qtBin = "${{ env.QT_ROOT_DIR }}\bin"
          & "$qtBin\windeployqt.exe" --release --no-compiler-runtime `
            thalamus-native\build\Thalamus.exe

      # ── Stage installer payload ───────────────────────────────────────────
      - name: Stage installer payload
        shell: pwsh
        run: |
          $stage = "thalamus-native\build\stage"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          # Main app
          Copy-Item "thalamus-native\build\Thalamus.exe" "$stage\"
          Copy-Item "thalamus-native\build\*.dll" "$stage\" -ErrorAction SilentlyContinue
          Copy-Item "thalamus-native\build\platforms" "$stage\" -Recurse -ErrorAction SilentlyContinue
          Copy-Item "thalamus-native\build\styles" "$stage\" -Recurse -ErrorAction SilentlyContinue
          Copy-Item "thalamus-native\build\iconengines" "$stage\" -Recurse -ErrorAction SilentlyContinue
          Copy-Item "thalamus-native\build\imageformats" "$stage\" -Recurse -ErrorAction SilentlyContinue
          Copy-Item "thalamus-native\build\tls" "$stage\" -Recurse -ErrorAction SilentlyContinue

          # Icon
          Copy-Item "thalamus-native\ThalamusApp\resources\icons\app.ico" "$stage\"

      # ── Generate WiX harvest fragment ──────────────────────────────────
      # WiX v4 dropped heat.exe from the core CLI, so we generate the harvest
      # fragment directly with a PowerShell script.
      #
      # The generated WXS uses DirectoryRef with nested Directory elements to
      # preserve Qt plugin subdirectory structure (platforms, styles, etc.).
      # A ComponentGroup at the end collects all components via ComponentRef
      # so Product.ci.wxs can reference them via ComponentGroupRef Id="AllAppFiles".
      - name: Harvest files with WiX heat
        shell: pwsh
        run: |
          $stage = Resolve-Path "thalamus-native\build\stage"
          $output = "thalamus-native\build\HeatFiles.wxs"
          $stageLen = $stage.Path.Length + 1

          # Collect all files (excluding .pdb)
          $allFiles = Get-ChildItem -Path $stage -File -Recurse | Where-Object { $_.Extension -ne '.pdb' }

          # Group files by their relative directory path
          $fileGroups = @{ '' = @() }
          foreach ($file in $allFiles) {
            $rel = $file.FullName.Substring($stageLen)
            $dir = [System.IO.Path]::GetDirectoryName($rel)
            if (-not $dir) { $dir = '' }
            if (-not $fileGroups.ContainsKey($dir)) { $fileGroups[$dir] = @() }
            $fileGroups[$dir] += @{ File = $file; RelPath = $rel }
          }

          # Collect all unique directory paths sorted (parents before children)
          $allDirs = $fileGroups.Keys | Where-Object { $_ -ne '' } | Sort-Object
          $allDirsRev = $allDirs | Sort-Object -Descending

          # Helper: sanitize a relative dir path into a WiX identifier
          function DirId($relDir) {
            if (-not $relDir) { return 'INSTALLFOLDER' }
            'd_' + $relDir.Replace('\','_').Replace('.','_').Replace(' ','_').Replace('-','_')
          }

          $sb = New-Object System.Text.StringBuilder
          [void]$sb.AppendLine('<?xml version="1.0" encoding="utf-8"?>')
          [void]$sb.AppendLine('<Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">')
          [void]$sb.AppendLine('  <Fragment>')
          [void]$sb.AppendLine('    <DirectoryRef Id="INSTALLFOLDER">')

          # Emit files in the root directory directly
          $idx = 0
          foreach ($fe in $fileGroups['']) {
            $idx++
            [void]$sb.AppendLine("      <Component Id=`"C_h$idx`" Guid=`"*`">")
            if ($fe.File.Name -eq 'Thalamus.exe') {
              # Give Thalamus.exe a known File Id so CustomAction can reference it
              [void]$sb.AppendLine("        <File Id=`\"F_ThalamusExe`\" Source=`"$($fe.File.FullName)`" />")
            } else {
              [void]$sb.AppendLine("        <File Source=`"$($fe.File.FullName)`" />")
            }
            [void]$sb.AppendLine("      </Component>")
          }

          # Walk each subdirectory and emit files nested inside Directory elements
          foreach ($dir in $allDirs) {
            $parts = $dir -split '\\'
            $dirName = $parts[-1]
            [void]$sb.AppendLine("      <Directory Id=`"$(DirId $dir)`" Name=`"$dirName`">")
            foreach ($fe in $fileGroups[$dir]) {
              $idx++
              [void]$sb.AppendLine("        <Component Id=`"C_h$idx`" Guid=`"*`">")
              [void]$sb.AppendLine("          <File Source=`"$($fe.File.FullName)`" />")
              [void]$sb.AppendLine("        </Component>")
            }
          }

          # Close all Directory elements (reverse order)
          foreach ($dir in $allDirsRev) {
            [void]$sb.AppendLine('      </Directory>')
          }

          [void]$sb.AppendLine('    </DirectoryRef>')

          # ComponentGroup referencing all harvested components
          [void]$sb.AppendLine('    <ComponentGroup Id="AllAppFiles">')
          for ($i = 1; $i -le $idx; $i++) {
            [void]$sb.AppendLine("      <ComponentRef Id=`"C_h$i`" />")
          }
          [void]$sb.AppendLine('    </ComponentGroup>')

          [void]$sb.AppendLine('  </Fragment>')
          [void]$sb.AppendLine('</Wix>')

          $sb.ToString() | Out-File -FilePath $output -Encoding utf8
          Write-Host "Generated harvest: $idx files in $($allDirs.Count) subdirectories"

      # ── Compile WiX sources ──────────────────────────────────────────────
      - name: Compile WiX sources
        shell: pwsh
        run: |
          $buildDir = "thalamus-native\build"
          wix build `
            "$buildDir\HeatFiles.wxs" `
            "thalamus-native\installer\Product.ci.wxs" `
            -o "$buildDir\ThalamusApp.msi" `
            -d Version=${{ env.APP_VERSION }} `
            -arch x64 `
            -ext "$env:WIX_UI_DLL"

      # ── Build Burn bootstrapper (.exe) ───────────────────────────────────
      - name: Build Burn Bundle
        shell: pwsh
        run: |
          $buildDir = "thalamus-native\build"
          $distDir = "thalamus-native\dist"
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null

          wix build `
            "thalamus-native\installer\Bundle.ci.wxs" `
            -o "$distDir\${{ env.INSTALLER_NAME }}" `
            -d Version=${{ env.APP_VERSION }} `
            -d MsiPath="$buildDir\ThalamusApp.msi" `
            -arch x64 `
            -ext "$env:WIX_BAL_DLL" `
            -ext "$env:WIX_UI_DLL"

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Thalamus AI ${{ github.ref_name }}
          body: |
            ## Thalamus AI — Native Windows Installer

            **Version:** ${{ github.ref_name }}

            ### What's included:
            - Qt 6 C++ desktop application (Chat, Research, Study, Code, VM Sandbox)
            - Built-in VNC client
            - `thalamus://` protocol handler for one-click VM boot
            - Auto-start VM Bridge service
            - Microsoft VC++ Redistributable 2022 (auto-installed)

            ### System Requirements:
            - Windows 10 64-bit or later
            - 8GB+ RAM recommended
            - Hardware virtualization (VT-x/AMD-V) for VM Sandbox

            ### Install:
            1. Download `${{ env.INSTALLER_NAME }}`
            2. Double-click to run (Windows SmartScreen may show a warning — click "More info" → "Run anyway")
            3. Follow the setup wizard
            4. Thalamus AI will launch automatically after installation
          files: |
            thalamus-native/dist/${{ env.INSTALLER_NAME }}
            thalamus-native/build/ThalamusApp.msi
          draft: false
          prerelease: false
