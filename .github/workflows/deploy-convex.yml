name: Deploy Convex with Gemini Keys

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Set Gemini keys in Convex env
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          GEMINI_KEYS_JSON: ${{ secrets.GEMINI_KEYS_JSON }}
        run: |
          if [ -n "$GEMINI_KEYS_JSON" ]; then
            npx convex env set GEMINI_KEYS_JSON "$GEMINI_KEYS_JSON" --prod
          fi

      - name: Deploy Convex functions
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex deploy --prod
