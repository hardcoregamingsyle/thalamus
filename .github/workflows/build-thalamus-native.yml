name: Build Thalamus Native Windows App

on:
  push:
    branches: [main]
    paths:
      - 'thalamus-native/**'
  workflow_dispatch:

env:
  APP_VERSION: '1.0.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install Qt 6 via vcpkg ─────────────────────────────────────
      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/Microsoft/vcpkg.git "$env:RUNNER_WORKSPACE/vcpkg"
          & "$env:RUNNER_WORKSPACE/vcpkg/bootstrap-vcpkg.bat"
          echo "VCPKG_ROOT=$env:RUNNER_WORKSPACE/vcpkg" >> "$env:GITHUB_ENV"

      - name: Cache vcpkg binaries
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.workspace }}/vcpkg/installed
            ${{ runner.workspace }}/vcpkg/packages
            ${{ runner.workspace }}/vcpkg/downloads
          key: ${{ runner.os }}-vcpkg-qtbase
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install Qt6 via vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          & "$env:RUNNER_WORKSPACE/vcpkg/vcpkg" install "qtbase[core,gui,widgets,network]:x64-windows"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # ── Build ThalamusApp ───────────────────────────────────────────
      - name: Configure CMake
        shell: cmd
        run: |
          cd thalamus-native
          if not exist build mkdir build
          cd build
          cmake ..\ThalamusApp -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        run: |
          cd thalamus-native/build
          cmake --build . --config Release --parallel

      - name: Copy to dist
        run: |
          $dist = "thalamus-native/dist"
          if (-not (Test-Path $dist)) { New-Item -ItemType Directory -Force $dist }
          Copy-Item "thalamus-native/build/Thalamus.exe" "$dist/Thalamus.exe" -Force
          # Also copy next to .wxs files for WiX
          Copy-Item "thalamus-native/build/Thalamus.exe" "thalamus-native/installer/Thalamus.exe" -Force

      # ── WiX v4 MSI + Burn EXE ──────────────────────────────────────
      - name: Install WiX
        run: |
          dotnet tool install --global wix
          wix --version

      - name: Install WiX Extensions
        run: |
          wix extension add WixToolset.UI.wixext
          wix extension add WixToolset.Bal.wixext

      - name: Build MSI Installer
        working-directory: thalamus-native
        shell: cmd
        run: |
          wix build installer\Product.wxs -o dist\Thalamus-Setup-v%APP_VERSION%.msi -ext WixToolset.UI.wixext -arch x64

      - name: Build Burn EXE
        working-directory: thalamus-native
        shell: cmd
        run: |
          wix build installer\Bundle.wxs -o dist\Thalamus-Setup-Burn-v%APP_VERSION%.exe -ext WixToolset.Bal.wixext -arch x64

      # ── Upload artifacts ────────────────────────────────────────────
      - name: List outputs
        run: Get-ChildItem -Path thalamus-native/dist -Recurse

      - name: Upload MSI
        if: hashFiles('thalamus-native/dist/Thalamus-Setup-v*.msi') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Thalamus-MSI
          path: thalamus-native/dist/Thalamus-Setup-v*.msi

      - name: Upload Burn EXE
        if: hashFiles('thalamus-native/dist/Thalamus-Setup-Burn-v*.exe') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Thalamus-Burn-EXE
          path: thalamus-native/dist/Thalamus-Setup-Burn-v*.exe

      - name: Upload Thalamus binary
        if: hashFiles('thalamus-native/dist/Thalamus.exe') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Thalamus-binary
          path: thalamus-native/dist/Thalamus.exe

      # ── Create Release ──────────────────────────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            thalamus-native/dist/Thalamus-Setup-v*.msi
            thalamus-native/dist/Thalamus-Setup-Burn-v*.exe
            thalamus-native/dist/Thalamus.exe
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
