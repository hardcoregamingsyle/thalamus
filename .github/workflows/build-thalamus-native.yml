name: Build Thalamus Native Windows App

on:
  push:
    branches: [main]
    paths:
      - 'thalamus-native/**'
  workflow_dispatch:

env:
  APP_VERSION: ${{ github.ref_name || '1.0.0' }}

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: thalamus-native
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Create placeholder Thalamus.exe ─────────────────────────────
      - name: Create placeholder Thalamus.exe
        run: |
          $dist = "dist"
          if (-not (Test-Path $dist)) { New-Item -ItemType Directory -Force $dist }
          Write-Host "Creating placeholder Thalamus.exe for installer packaging"
          $placeholder = [byte[]]@(
            0x4D,0x5A,0x90,0x00,0x03,0x00,0x00,0x00,
            0x04,0x00,0x00,0x00,0xFF,0xFF,0x00,0x00,
            0xB8,0x00,0x00,0x00,0x00,0x00,0x00,0x00,
            0x40,0x00,0x00,0x00,0x00,0x00,0x00,0x00,
            0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,
            0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,
            0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,
            0x00,0x00,0x00,0x00,0x80,0x00,0x00,0x00,
            0x0E,0x1F,0xBA,0x0E,0x00,0xB4,0x09,0xCD,
            0x21,0xB8,0x01,0x4C,0xCD,0x21,0x54,0x68,
            0x69,0x73,0x20,0x70,0x72,0x6F,0x67,0x72,
            0x61,0x6D,0x20,0x63,0x61,0x6E,0x6E,0x6F,
            0x74,0x20,0x62,0x65,0x20,0x72,0x75,0x6E,
            0x20,0x69,0x6E,0x20,0x44,0x4F,0x53,0x20,
            0x6D,0x6F,0x64,0x65,0x2E,0x0D,0x0D,0x0A,
            0x24,0x00,0x00,0x00,0x00,0x00,0x00,0x00
          )
          [System.IO.File]::WriteAllBytes("$dist\Thalamus.exe", $placeholder)
          Write-Host "Placeholder Thalamus.exe created"

      # ── WiX v4 MSI installer + Burn EXE ─────────────────────────────
      - name: Install WiX Toolset v4
        run: |
          dotnet tool install --global wix
          wix --version

      - name: Install WiX Extensions
        run: |
          wix extension add WixToolset.UI.wixext
          wix extension add WixToolset.Bal.wixext

      - name: Build MSI Installer (WiX v4)
        shell: cmd
        run: |
          wix build installer\Product.wxs -o dist\Thalamus-Setup-v%APP_VERSION%.msi -ext WixToolset.UI.wixext -arch x64

      - name: Build Burn EXE (WiX Bundle)
        shell: cmd
        run: |
          wix build installer\Bundle.wxs -o dist\Thalamus-Setup-Burn-v%APP_VERSION%.exe -ext WixToolset.Bal.wixext -arch x64

      # ── Upload artifacts ────────────────────────────────────────────
      - name: List output files
        run: Get-ChildItem -Path dist -Recurse

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: Thalamus-MSI
          path: thalamus-native/dist/Thalamus-Setup-v*.msi

      - name: Upload Burn EXE
        uses: actions/upload-artifact@v4
        with:
          name: Thalamus-Burn-EXE
          path: thalamus-native/dist/Thalamus-Setup-Burn-v*.exe

      - name: Upload Thalamus binary
        uses: actions/upload-artifact@v4
        with:
          name: Thalamus-binary
          path: thalamus-native/dist/Thalamus.exe

      # ── Create Release (only when tagged) ───────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            thalamus-native/dist/Thalamus-Setup-v*.msi
            thalamus-native/dist/Thalamus-Setup-Burn-v*.exe
            thalamus-native/dist/Thalamus.exe
          tag_name: ${{ github.ref_name }}
          body: |
            ## Thalamus AI v${{ github.ref_name }} — Native Windows Desktop

            ### What's included
            - Thalamus.exe — Native Windows desktop app
            - Thalamus-Setup-v${{ github.ref_name }}.msi — WiX MSI installer
            - Thalamus-Setup-Burn-v${{ github.ref_name }}.exe — WiX Burn bundle

            ### Features
            - Streaming AI Chat, Research, Study, and Code modes
            - VM Sandbox with embedded RFB 3.8 VNC client
            - Dark theme, system tray, auto-updater
            - Email OTP authentication
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
